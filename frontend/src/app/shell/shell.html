<mat-sidenav-container class="sidenav-container">
  <mat-sidenav [mode]="'over'" [opened]="opened()" (closed)="opened.set(false)" class="sidenav" role="navigation" aria-label="Main navigation">
    <div class="sidenav-header">
      <mat-icon class="logo-icon">memory</mat-icon>
      <span class="logo-text">Spring IA</span>
    </div>
    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a mat-list-item [routerLink]="item.route" routerLinkActive="active-link" (click)="opened.set(false)">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="top-toolbar">
      <button mat-icon-button (click)="toggle()" aria-label="Toggle navigation menu">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">Spring IA</span>
      <span class="toolbar-spacer"></span>
      <mat-icon class="status-icon">wifi</mat-icon>
    </mat-toolbar>

    <main class="page-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
