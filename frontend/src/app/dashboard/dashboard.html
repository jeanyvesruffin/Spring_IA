<section class="dashboard">
  <div class="page-header">
    <mat-icon>dashboard</mat-icon>
    <h2>Tableau de bord</h2>
  </div>

  <div class="cards-grid">
    <mat-card class="stat-card" (click)="navigateTo('/chat')" (keydown.enter)="navigateTo('/chat')" tabindex="0" role="button" aria-label="Ouvrir le chat IA">
      <mat-card-content>
        <mat-icon class="card-icon accent-cyan">chat</mat-icon>
        <h3>Chat IA</h3>
        <p>Posez vos questions à l'intelligence artificielle</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <mat-icon class="card-icon accent-green">history</mat-icon>
        <h3>Historique</h3>
        <p class="stat-value">{{ historyCount() }}</p>
        <p>requêtes enregistrées</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <mat-icon class="card-icon accent-orange">link</mat-icon>
        <h3>API Endpoint</h3>
        <p class="stat-value mono">{{ apiUrl() }}</p>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <mat-icon class="card-icon accent-purple">timer</mat-icon>
        <h3>Timeout</h3>
        <p class="stat-value">{{ timeoutMs() }} ms</p>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="quick-actions">
    <h3>Actions rapides</h3>
    <div class="actions-row">
      <button mat-raised-button color="primary" (click)="navigateTo('/chat')">
        <mat-icon>chat</mat-icon>
        Nouveau chat
      </button>
      <button mat-stroked-button (click)="navigateTo('/tester')">
        <mat-icon>api</mat-icon>
        Tester un endpoint
      </button>
      <button mat-stroked-button (click)="navigateTo('/history')">
        <mat-icon>history</mat-icon>
        Voir l'historique
      </button>
    </div>
  </div>
</section>
